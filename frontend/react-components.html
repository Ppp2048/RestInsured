<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestInsured Options — React Premium UI Showcase</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg: #09090B;          /* Sleek Dark Mode */
            --surface: #18181B;
            --border: #27272A;
            --border-hover: #3F3F46;
            --primary: #FFFFFF;
            --muted: #A1A1AA;
            --accent: #2563EB;
            --success: #10B981;
            --danger: #F43F5E;
            --radius: 20px;
            --radius-sm: 10px;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 15% 50%, rgba(37, 99, 235, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%);
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 3rem 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation Link back to original site */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            transition: all 0.2s;
        }
        .back-link:hover {
            color: var(--primary);
            background: rgba(255,255,255,0.1);
        }

        h1 {
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 0.5rem;
        }
        
        .grid {
            display: grid;
            gap: 2rem;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            margin-top: 3rem;
        }

        .card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            position: relative;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        /* Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 10px 0;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 6px; cursor: pointer;
            background: var(--border); border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 20px; width: 20px; border-radius: 50%;
            background: var(--primary); cursor: pointer;
            -webkit-appearance: none; margin-top: -7px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border: 2px solid var(--bg);
        }
    </style>

    <!-- Import Map for ES Modules bypassing Node/NPM -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0?dev",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
                "framer-motion": "https://esm.sh/framer-motion@10.16.4?dev",
                "gsap": "https://esm.sh/gsap@3.12.2",
                "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0",
                "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.2"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height:100vh; color:#A1A1AA; font-family:Inter,sans-serif;">
            Compiling React bundles natively in browser...
        </div>
    </div>

    <!-- React Application -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { motion, useMotionValue, useSpring, useTransform, AnimatePresence } from 'framer-motion';
        import gsap from 'gsap';
        import { Shield, Car, Home, HeartPulse, CheckCircle2, Star, Calculator, Cuboid, TrendingUp, Sparkles, ArrowLeft } from 'lucide-react';
        import confetti from 'canvas-confetti';

        // ════════════════════════════════════════════
        // 1. React Quote Calculator (Animated Premium)
        // ════════════════════════════════════════════
        const QuoteCalculator = () => {
            const [coverage, setCoverage] = useState(5000000);
            const [deductible, setDeductible] = useState(50000);
            
            // Formula
            const premiumRaw = (coverage * 0.0018) - (deductible * 0.05);
            const premium = premiumRaw > 1000 ? premiumRaw : 1000;
            
            // Framer Motion animated counter
            const motionPremium = useMotionValue(0);
            const springPremium = useSpring(motionPremium, { stiffness: 60, damping: 15 });
            const [displayPremium, setDisplayPremium] = useState(0);

            useEffect(() => {
                motionPremium.set(premium);
            }, [premium, motionPremium]);

            useEffect(() => {
                return springPremium.on("change", v => setDisplayPremium(Math.round(v)));
            }, [springPremium]);

            const fillPct = (coverage / 10000000) * 100;

            // Formatter
            const fmt = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });

            return (
                <div className="card">
                    <h2><Calculator size={22} color="var(--accent)"/> Dynamic Quote Engine</h2>
                    
                    <div style={{marginTop: '0.5rem'}}>
                        <div style={{display:'flex', justifyContent:'space-between', fontSize:'13px', color:'var(--muted)'}}>
                            <label>Coverage Amount</label>
                            <span style={{color:'var(--primary)', fontWeight:600}}>{fmt.format(coverage)}</span>
                        </div>
                        <input type="range" min="1000000" max="10000000" step="100000" value={coverage} onChange={e => setCoverage(e.target.value)} />
                        
                        {/* Animated Bar Chart Fill */}
                        <div style={{width:'100%', height:'6px', background:'var(--border)', borderRadius:'3px', marginTop:'8px', overflow:'hidden'}}>
                            <motion.div 
                                style={{height: '100%', background: 'linear-gradient(90deg, var(--accent), #60A5FA)'}}
                                initial={{width: 0}}
                                animate={{width: `${fillPct}%`}}
                                transition={{type: 'spring', bounce: 0.2}}
                            />
                        </div>
                    </div>

                    <div style={{marginTop: '2rem'}}>
                        <div style={{display:'flex', justifyContent:'space-between', fontSize:'13px', color:'var(--muted)'}}>
                            <label>Voluntary Deductible</label>
                            <span style={{color:'var(--primary)', fontWeight:600}}>{fmt.format(deductible)}</span>
                        </div>
                        <input type="range" min="0" max="100000" step="5000" value={deductible} onChange={e => setDeductible(e.target.value)}/>
                    </div>

                    <div style={{marginTop:'auto', paddingTop:'2rem'}}>
                        <div style={{padding:'1.5rem', background:'var(--bg)', borderRadius:'var(--radius-sm)', border:'1px solid var(--border)', textAlign:'center'}}>
                            <div style={{fontSize:'12px', color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em', fontWeight:700}}>Annual Premium Forecast</div>
                            <div style={{fontSize:'3rem', fontWeight:'800', color:'var(--success)', letterSpacing:'-0.03em', lineHeight:1.2, marginTop:'8px'}}>
                                ₹{displayPremium.toLocaleString('en-IN')}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ════════════════════════════════════════════
        // 2. 3D Policy Customizer UI (Draggable, GSAP)
        // ════════════════════════════════════════════
        const PolicyCustomizer = () => {
            const containerRef = useRef(null);
            const [saved, setSaved] = useState(false);

            useEffect(() => {
                // GSAP Staggered explosion on mount
                gsap.fromTo(containerRef.current.children, 
                    { scale: 0, opacity: 0, rotationY: 90, z: -100 }, 
                    { scale: 1, opacity: 1, rotationY: 0, z: 0, duration: 1, stagger: 0.15, ease: 'back.out(1.5)' }
                );
            }, []);

            return (
                <div className="card" style={{overflow:'hidden'}}>
                    <h2><Cuboid size={22} color="var(--danger)"/> 3D Bundle Customizer</h2>
                    <p style={{color:'var(--muted)', fontSize:'14px', marginBottom:'2rem'}}>Drag icons to instantly assemble your personalized combo. Physics powered by Framer Motion.</p>

                    <div ref={containerRef} style={{display:'flex', justifyContent:'space-around', margin:'1rem 0 3rem', perspective:'1000px'}}>
                        {[
                            {icon: HeartPulse, color: '#F43F5E', label: "Health"},
                            {icon: Car, color: '#3B82F6', label: "Motor"},
                            {icon: Home, color: '#10B981', label: "Home"}
                        ].map((Item, i) => (
                            <motion.div 
                                key={i}
                                drag 
                                dragConstraints={{left: -50, right: 50, top: -50, bottom: 50}}
                                whileHover={{scale: 1.15, zIndex:10}}
                                whileDrag={{scale: 1.2, cursor: 'grabbing', rotate: i % 2 === 0 ? 10 : -10}}
                                onDragEnd={() => setSaved(true)}
                                style={{
                                    width:'70px', height:'70px', 
                                    background:'var(--bg)', border:'1px solid var(--border)', 
                                    borderRadius:'50%', cursor:'grab',
                                    display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                                    boxShadow:'0 10px 20px rgba(0,0,0,0.5)'
                                }}>
                                <Item.icon size={28} color={Item.color} />
                            </motion.div>
                        ))}
                    </div>

                    <div style={{marginTop:'auto'}}>
                        <AnimatePresence>
                            {saved && (
                                <motion.div 
                                    initial={{opacity: 0, y: 20}}
                                    animate={{opacity: 1, y: 0}}
                                    className="savings-popup"
                                    style={{
                                        background:'rgba(16, 185, 129, 0.1)', border:'1px solid rgba(16, 185, 129, 0.2)',
                                        padding:'1rem', borderRadius:'var(--radius-sm)', textAlign:'center'
                                    }}>
                                    <div style={{color:'var(--success)', fontWeight:700, fontSize:'14px'}}>Combo Activated!</div>
                                    <div style={{color:'var(--primary)', fontSize:'13px', marginTop:'4px'}}>You unlocked a 15% Multi-line discount.</div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </div>
                </div>
            );
        };

        // ════════════════════════════════════════════
        // 3. Animated Policy Card (Hover glow, Rotate)
        // ════════════════════════════════════════════
        const AnimatedPolicyCard = () => {
            return (
                <div className="card" style={{display:'flex', flexDirection:'column'}}>
                    <h2><Sparkles size={22} color="#F59E0B"/> Featured Plan</h2>
                    
                    <motion.div 
                        whileHover="hover"
                        initial="initial"
                        style={{
                            background:'var(--bg)', border:'1px solid var(--border)', borderRadius:'var(--radius)',
                            padding:'2rem', cursor:'pointer', position:'relative',
                            marginTop:'1rem', display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center'
                        }}
                        variants={{
                            initial: { y: 0, boxShadow: '0 4px 6px rgba(0,0,0,0.1)' },
                            hover: { y: -8, boxShadow: '0 25px 50px -12px rgba(37, 99, 235, 0.25)' }
                        }}
                        transition={{type:'spring', duration:0.5}}>
                        
                        {/* Hover Rotating Shield */}
                        <motion.div 
                            variants={{
                                initial: { rotate: 0, scale: 1, boxShadow: '0 0 0 rgba(37,99,235,0)' },
                                hover: { rotate: 360, scale: 1.1, boxShadow: '0 0 30px rgba(37,99,235,0.6)' }
                            }}
                            transition={{type:'spring', bounce:0.4, duration:0.8}}
                            style={{
                                width:'60px', height:'60px', borderRadius:'16px',
                                background:'linear-gradient(135deg, var(--accent), #93C5FD)',
                                display:'flex', alignItems:'center', justifyContent:'center',
                                marginBottom:'1.5rem'
                            }}>
                            <Shield size={30} color="#FFF" />
                        </motion.div>
                        
                        <h3 style={{margin:'0 0 8px', fontSize:'1.2rem'}}>Optima Restore Shield</h3>
                        <p style={{fontSize:'13px', color:'var(--muted)', margin:0, lineHeight:1.5}}>
                            Comprehensive coverage that magically restores your sum insured upon exhaustion. Best-in-class CSR.
                        </p>
                    </motion.div>
                </div>
            );
        };

        // ════════════════════════════════════════════
        // 4. Claims Tracker Stepper (Fill Anime + Confetti)
        // ════════════════════════════════════════════
        const ClaimsStepper = () => {
            const steps = ["Filed", "Reviewed", "Approved", "Paid"];
            const [current, setCurrent] = useState(0);

            const handleNext = () => {
                if(current < steps.length - 1) {
                    const next = current + 1;
                    setCurrent(next);
                    if(next === steps.length - 1) {
                         confetti({
                             particleCount: 150,
                             spread: 80,
                             origin: { y: 0.6 },
                             colors: ['#10B981', '#3B82F6', '#FFFFFF']
                         });
                    }
                } else {
                    setCurrent(0);
                }
            };

            return (
                <div className="card">
                    <h2><TrendingUp size={22} color="var(--success)"/> Claims Stepper</h2>
                    <p style={{color:'var(--muted)', fontSize:'14px', marginBottom:'3rem'}}>Click the card to simulate claim processing progression.</p>
                    
                    <div onClick={handleNext} style={{cursor:'pointer', position:'relative', padding:'0 10px'}}>
                        {/* Track Background */}
                        <div style={{position:'absolute', top:'13px', left:'10px', right:'10px', height:'4px', background:'var(--bg)', borderRadius:'2px', zIndex:0}}></div>
                        
                        {/* Animated Fill */}
                        <motion.div 
                            style={{position:'absolute', top:'13px', left:'10px', height:'4px', background:'var(--success)', borderRadius:'2px', zIndex:1}}
                            initial={{width: 0}}
                            animate={{width: `${(current / (steps.length - 1)) * 100}%`}}
                            transition={{type: 'spring', damping: 17}}
                        />
                        
                        <div style={{display:'flex', justifyContent:'space-between', position:'relative', zIndex:2}}>
                            {steps.map((step, idx) => {
                                const active = idx <= current;
                                return (
                                    <motion.div key={idx} 
                                        initial={{scale: 0.8}}
                                        animate={{
                                            scale: active ? 1 : 0.8,
                                            opacity: active ? 1 : 0.4
                                        }}
                                        style={{display:'flex', flexDirection:'column', alignItems:'center', gap:'12px', width:'60px'}}
                                    >
                                        <div style={{
                                            width:'30px', height:'30px', borderRadius:'50%',
                                            background: active ? 'var(--success)' : 'var(--bg)',
                                            border: `2px solid ${active ? 'var(--success)' : 'var(--border)'}`,
                                            display:'flex', alignItems:'center', justifyContent:'center',
                                            transition: 'all 0.3s'
                                        }}>
                                            {active && <CheckCircle2 size={16} color="#000" />}
                                        </div>
                                        <span style={{fontSize:'12px', fontWeight:600, color: active ? 'var(--primary)' : 'var(--muted)'}}>{step}</span>
                                    </motion.div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // ════════════════════════════════════════════
        // 5. Testimonials Carousel
        // ════════════════════════════════════════════
        const TestimonialsCarousel = () => {
            const reviews = [
                { name: "Rahul S.", txt: "The UI here is butter smooth. I saved ₹15,000 on my premium within flat 5 minutes." },
                { name: "Priya M.", txt: "Hands down the best insurance portal in India. Claim was settled seamlessly." },
                { name: "Karan T.", txt: "Visuals make boring insurance actually engaging. The 3D customizer is just mind blowing." },
                { name: "Neha K.", txt: "Unmatched pricing and transparency. The analytics dashboard gave me so much clarity." }
            ];

            return (
                <div className="card" style={{gridColumn: '1 / -1', overflow:'hidden'}}>
                    <h2><Star size={22} color="#F59E0B"/> Featured React Testimonials Carousel</h2>
                    <p style={{color:'var(--muted)', fontSize:'14px', marginBottom:'1.5rem'}}>Swipe or drag the cards (X-axis) to see user reviews sliding effortlessly mapped in 3D physics constraints.</p>
                    
                    <motion.div 
                        drag="x"
                        dragConstraints={{ right: 0, left: -600 }}
                        whileTap={{cursor:'grabbing'}}
                        style={{display:'flex', gap:'1.5rem', cursor:'grab', paddingBottom:'1rem'}}>
                        
                        {reviews.map((rev, idx) => (
                            <motion.div 
                                key={idx} 
                                style={{
                                    minWidth:'320px', background:'var(--bg)', border:'1px solid var(--border)',
                                    borderRadius:'var(--radius-sm)', padding:'1.5rem', flexShrink: 0
                                }}
                                whileHover={{scale: 1.02, rotateY: 5}}
                                transition={{type:'spring', stiffness:300}}>
                                <div style={{display:'flex', gap:'4px', color:'#F59E0B', marginBottom:'12px'}}>
                                    <Star size={14} fill="currentColor"/>
                                    <Star size={14} fill="currentColor"/>
                                    <Star size={14} fill="currentColor"/>
                                    <Star size={14} fill="currentColor"/>
                                    <Star size={14} fill="currentColor"/>
                                </div>
                                <p style={{fontSize:'14px', lineHeight:1.6, color:'var(--muted)', marginBottom:'1rem'}}>"{rev.txt}"</p>
                                <strong style={{fontSize:'13px', color:'var(--primary)'}}>{rev.name}</strong>
                            </motion.div>
                        ))}
                        
                    </motion.div>
                </div>
            );
        };

        // ════════════════════════════════════════════
        // Main App Layout
        // ════════════════════════════════════════════
        const App = () => {
            return (
                <div style={{maxWidth: '1200px', margin: '0 auto'}}>
                    <a href="index.html" className="back-link"><ArrowLeft size={16}/> Back to Main Site</a>
                    <h1>Interactive React Components</h1>
                    <p style={{color:'var(--muted)', fontSize:'16px'}}>An immersive demonstration of complex Framer Motion, GSAP, and React patterns running gracefully.</p>
                    
                    <div className="grid">
                        <QuoteCalculator />
                        <PolicyCustomizer />
                        <AnimatedPolicyCard />
                        <ClaimsStepper />
                        <TestimonialsCarousel />
                    </div>
                </div>
            );
        };

        // Mount React
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
